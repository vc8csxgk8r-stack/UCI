version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uci-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - uci-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Uncomment to persist cache across restarts:
    # volumes:
    #   - uci-cache:/app/cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uci-frontend
    restart: unless-stopped
    ports:
      - "8282:80"       # Accès : http://votre-ip:8282
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uci-net

networks:
  uci-net:
    driver: bridge

